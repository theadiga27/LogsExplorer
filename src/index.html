<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logs Explorer</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- DataTables -->
  <link href="https://cdn.datatables.net/2.1.8/css/dataTables.bootstrap5.min.css" rel="stylesheet" />

  <!-- Custom Styles -->
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="window-frame">
      <header class="topbar">
        <div class="title">
          <span class="logo-dot">
            <i class="bi bi-grid-1x2-fill"></i>
          </span>
          <span>Logs Explorer</span>
        </div>

        <div class="d-flex align-items-center gap-3 w-100 justify-content-end flex-wrap">
          <div class="search-box">
            <i class="bi bi-search text-secondary"></i>
            <input id="globalSearch" type="text" placeholder="Search..." />
          </div>
          <div class="user-chip" title="admin"></div>
        </div>
      </header>

      <main class="content">
        <section class="panel">
          <div class="panel-title">Filters</div>

          <form id="filterForm" autocomplete="off">
            <div class="row g-3 align-items-end">
              <div class="col-12 col-lg-3">
                <label class="section-label" for="applicationName">Application Name</label>
                <select id="applicationName" class="form-select">
                  <option value="">All Applications</option>
                </select>
              </div>

              <div class="col-12 col-lg-4">
                <label class="section-label" for="interfaceName">Interface Name</label>
                <select id="interfaceName" class="form-select">
                  <option value="">All Interfaces</option>
                </select>
              </div>

              <div class="col-12 col-lg-5">
                <label class="section-label">Date Range</label>
                <div class="row g-2 align-items-center">
                  <div class="col-5">
                    <input id="dateFrom" type="datetime-local" class="form-control" />
                  </div>
                  <div class="col-1 text-center text-secondary fw-semibold">→</div>
                  <div class="col-5">
                    <input id="dateTo" type="datetime-local" class="form-control" />
                  </div>
                  <div class="col-1 text-center text-primary fw-bold">»</div>
                </div>
              </div>
            </div>

            <div class="row mt-3 g-3 align-items-center">
              <div class="col-12 col-lg-4">
                <div class="d-flex gap-2 flex-wrap">
                  <button type="button" id="submitBtn" class="btn btn-primary">Submit</button>
                  <button type="button" id="clearBtn" class="btn btn-outline-secondary">Clear</button>
                </div>
              </div>

              <div class="col-12 col-lg-8 d-flex justify-content-lg-end">
                <div class="pill-filter">
                  <select id="recentRange" class="form-select">
                    <option value="">Recent (Select time)</option>
                    <option value="15">Last 15 minutes</option>
                    <option value="60">Last 1 hour</option>
                    <option value="240">Last 4 hours</option>
                    <option value="1440">Last 24 hours</option>
                  </select>
                </div>
              </div>
            </div>
          </form>
        </section>

        <section class="table-wrap mt-3">
          <div class="table-responsive">
            <table id="logsTable" class="table table-hover align-middle mb-0 w-100">
              <thead>
                <tr>
                  <th style="width:32px;"><input type="checkbox" class="form-check-input" /></th>
                  <th>Sequence_ID</th>
                  <th>Interface_Code</th>
                  <th>Application_Code</th>
                  <th>Transaction_ID</th>
                  <th>Logging_Stage</th>
                  <th>Target_Service</th>
                  <th>LogTime</th>
                  <th>Created_By</th>
                  <th>Modified_Date</th>
                  <th style="width:32px;"></th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>

          <div class="table-bottom">
            <div class="entries" id="entriesText">Showing 1-5 of 245 entries</div>
            <div class="pager" id="pager"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- JS Libraries -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/2.1.8/js/dataTables.bootstrap5.min.js"></script>

  <!-- App JS -->
  <script src="assets/js/api.js"></script>
  <script src="assets/js/table.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
